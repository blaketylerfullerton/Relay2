name: release

# Every push to main cross-compiles relay for all supported OS/arch and
# publishes them to a rolling "latest" GitHub Release. Machines pull the right
# binary via the install script or `relay update` — no Go required on them, and
# no tagging ceremony: just `git push` and the fleet can update.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

# Never let two builds race on the moving "latest" tag.
concurrency:
  group: release-latest
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # Full history so the commit count for the patch number is accurate
        # (the default shallow clone would always report 1).
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          # No go.sum / dependencies to cache; skip it to avoid a noisy warning.
          cache: false

      - name: Build binaries
        run: |
          mkdir -p dist
          # Version = the major.minor in ./VERSION + the number of commits since
          # that file last changed, as the patch. Bumping 0.1 -> 0.2 in VERSION
          # resets the patch to 0, so the number never balloons. No tags.
          base="$(git log -1 --format=%H -- VERSION)"
          patch="$(git rev-list --count "${base}..HEAD")"
          VERSION="$(cat VERSION).${patch}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          for target in darwin/arm64 darwin/amd64 linux/amd64 linux/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            echo "building relay_${os}_${arch} ($VERSION)"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
              go build -ldflags "-s -w -X relay/internal/cli.Version=${VERSION}" \
              -o "dist/relay_${os}_${arch}" .
          done
          ( cd dist && shasum -a 256 relay_* > checksums.txt )

      - name: Publish rolling "latest" release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Replace the moving tag + release so /releases/latest points here.
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest dist/* \
            --title "$VERSION" \
            --notes "Rolling build of main ($VERSION)." \
            --latest
